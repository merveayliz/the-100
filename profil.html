<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ARK-OS | Personel Profili</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/kesfet.css">
    <link rel="stylesheet" href="css/profil.css"> 
</head>
<body class="kesfet-sayfası">

<div class="sidebar">
    <div class="profil-kutu">
        <div class="profil-resim">
            <img src="img/murphy.jpg" id="nav-avatar" alt="Profil">
        </div>
        <span id="nav-user-name" style="color:#00ff96; font-size:0.8rem; display:block; text-align:center;">Skaikru</span>
    </div>
    <nav class="side-nav">
        <ul class="nav-links">
            <li><a href="anasayfa.html">📋 Ana Sayfa</a></li>
            <li><a href="kesfet.html">🌍 Keşfet</a></li>
            <li><a href="profil.html" class="aktif">👤 Profilim</a></li>
            <li><a href="sohbet.html">💬 Sohbet Odası</a></li>
        </ul>
    </nav>
</div>

<div class="ana-icerik">
    <div class="profil-konteynir">
        <div class="kimlik-karti">
            <div class="kart-isik"></div>
            <div class="profil-ust-kisim">
                <div class="buyuk-avatar-cerceve">
                    <img src="img/murphy.jpg" id="profil-ana-resim" class="buyuk-avatar">
                    <div class="online-status"></div>
                </div>
                <div class="profil-bilgi-metin">
                    <h1 id="profil-ad">Yükleniyor...</h1>
                    <p class="rutbe">SINIF: SKAIKRU | DURUM: AKTİF</p>
                    <div class="istatistikler">
                        <div class="stat-item"><strong>12</strong><span>Teori</span></div>
                        <div class="stat-item"><strong>450</strong><span>Takipçi</span></div>
                        <div class="stat-item"><strong>89</strong><span>Puan</span></div>
                    </div>
                </div>
            </div> 

            <div class="profil-aksiyonlar">
              <input type="file" id="dosya-secici" accept="image/*" style="display: none;" onchange="resmiKaydet(this)">
    
               <button class="inis-btn" onclick="document.getElementById('dosya-secici').click()">RESMİ GÜNCELLE</button>
    
               <button class="takip-btn" onclick="cikisYap()" style="border-color: #ff3e3e; color: #ff3e3e;">SİSTEMDEN ÇIK</button>
           </div>
        </div>

        <h3 style="color: var(--ana-neon); margin-top: 40px; font-family: 'Fira Code';">YAYINLANAN TEORİLERİM</h3>
        <div id="kullanici-teorileri" class="feed-konteynir">
            </div>
    </div>
</div>

<script type="module" src="js/profil.js"></script>
</body>
</html>
