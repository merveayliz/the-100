<body class="sohbet-body">
    
<div class="sidebar">

        </div>

    </div>

    <nav class="side-nav">
        <ul class="nav-links">

        </ul>
    </nav>
</div>

     <div class="terminal-pencere" style="height: 650px; max-width: 900px;">
        <div class="terminal-header">
            <span>SYSTEM_DIAGNOSTICS_V.2.0</span>
            <span id="test-saat">OKSİJEN: %100</span>
        </div>

        <div id="mesaj-alani">
            <div id="test-secim" class="merkez-icerik">
                <h2 style="color: #00ff96; margin-bottom: 20px;">TEST KATEGORİSİ SEÇİN</h2>
                <div class="test-buton-grubu">
                    <button onclick="testiHazirla('kitap_bilgi')">KİTAP BİLGİSİ</button>
                    <button onclick="testiHazirla('kitap_karakter')">KİTAP KARAKTERİ</button>
                    <button onclick="testiHazirla('dizi_bilgi')">DİZİ BİLGİSİ</button>
                    <button onclick="testiHazirla('dizi_karakter')">DİZİ KARAKTERİ</button>
                </div>
            </div>

            <div id="soru-konteynir" class="gizli">
                <div id="soru-metni" style="font-size: 1.3rem; margin-bottom: 20px;"></div>
                <div id="secenekler-listesi"></div>
            </div>
        </div>

        <div class="terminal-footer">
            <button id="sonraki-btn" class="gizli" onclick="sonrakiSoru()">SONRAKİ VERİ >></button>
            <button id="analiz-btn" class="gizli" onclick="sonucuHesapla()">ANALİZİ TAMAMLA</button>
        </div>
    </div>

    <div id="soz-modal" class="modal-gizli">
        <div class="modal-icerik" id="sonuc-penceresi">
            </div>
    </div>

    <script src="test.js"></script>
