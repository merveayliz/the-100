<!DOCTYPE html>
<html lang="tr">
<head>

    <title>ARK-OS | Earth Terminal</title>

<body class="sohbet-body"> 
    <div id="sohbet-ekrani">
        <div class="terminal-pencere">
            <div class="terminal-header">
                <span class="baslik-sol">MISSION_CHAT: EARTH_RECON</span>
                <span id="canli-saat" class="baslik-sag">--:--:--</span>
            </div>
            
            <div id="mesaj-alani">
                <div class="sistem-notu">[SYSTEM]: Connection established. Atmospheric data: STABLE.</div>
            </div>

            <div class="terminal-footer">
                <input type="text" id="mesaj-input" placeholder="Mesajını yaz, Skaikru.." autocomplete="off">
                <button id="gonder-btn" onclick="mesajGonder()">SEND</button>
            </div>
        </div>
    </div>

<div class="sidebar">
